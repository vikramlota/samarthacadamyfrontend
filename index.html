<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="sU9wMoN5Gp_yNILWMxUHvDdMtUKh4EP4w9n9KUPZb6M" />

    <!--
      Fallback title only — react-helmet-async overrides this per page.
      Do NOT add meta description, keywords, or viewport here again —
      SEOHead already injects those, and duplicates cause Seobility errors.
    -->
    <title>Samarth Academy | SSC, Banking &amp; Govt Exam Coaching</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/purelogo.png" />
    <link rel="apple-touch-icon" href="/images/purelogo.png" />

    <!--
      Preconnect hints must be in static HTML (not in Helmet) to work early.
      Helmet injects after React mounts — too late for preconnect to help.
    -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
