<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="sU9wMoN5Gp_yNILWMxUHvDdMtUKh4EP4w9n9KUPZb6M" />

    <!--
      Fallback title + meta only — react-helmet-async overrides these per page.
      Keep these as short, accurate fallbacks for the rare case Helmet hasn't
      mounted yet (e.g., first paint before hydration completes).
    -->
    <title>Samarth Academy | SSC, Banking &amp; Govt Exam Coaching in Amritsar</title>
    <meta name="description" content="Samarth Academy — officer-led coaching for SSC, Banking, Punjab Police and more. Located near GNDU Amritsar. Batches capped at 30. Free demo class." />

    <!-- Favicons -->
    <link rel="icon"             type="image/x-icon" href="/favicon.ico" />
    <link rel="icon"             type="image/png"    sizes="32x32"  href="/favicon-32x32.png" />
    <link rel="icon"             type="image/png"    sizes="16x16"  href="/favicon-16x16.png" />
    <link rel="apple-touch-icon"                     sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Fallback: existing logo until proper favicons are generated -->
    <link rel="icon"             type="image/png"    href="/images/purelogo.png" />

    <!-- Brand theme color (matches Samarth red) -->
    <meta name="theme-color" content="#C4151C" />

    <!-- Default Open Graph (per-page Helmet overrides these) -->
    <meta property="og:image"        content="https://thesamarthacademy.in/og.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="Samarth Academy" />
    <meta name="twitter:card"        content="summary_large_image" />

    <!--
      Preconnect hints MUST be in static HTML (not Helmet) to work early.
      Helmet injects after React mounts — too late for preconnect to help.
    -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
